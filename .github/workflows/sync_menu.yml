name: Sync Menu from Toolkit

on:
  schedule:
    - cron: '0 0 * * *' # Run automatically every day at midnight UTC
  workflow_dispatch: # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        run: node .github/scripts/sync_menu.js

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html js/main.js locales/*.json
          # Check if there are changes before committing
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync menu from ncexs-toolkit PS1 script" && git pull --rebase origin main && git push)
